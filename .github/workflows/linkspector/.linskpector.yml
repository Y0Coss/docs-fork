dirs:
  - ./
excludedDirs:
  - ./images
ignorePatterns:
  - pattern: '^https://example.com/skip/.*$'
  - pattern: "^(ftp)://[^\\s/$?#]*\\.[^\\s]*$"
  - pattern: 'https://www.ovh.com.*$'
  - pattern: 'https://www.ovhcloud.com.*$'
replacementPatterns:
  - pattern: "(https?://example.com)/(\\w+)/(\\d+)"
    replacement: '$1/id/$3'
  - pattern: "\\[([^\\]]+)\\]\\((https?://example.com)/file\\)"
    replacement: '<a href="$2/file">$1</a>'
httpHeaders:
  - url:
      - https://example1.com
    headers:
      Authorization: Basic Zm9vOmJhcg==
      Foo: Bar
aliveStatusCodes:
  - 200
  - 201
  - 204
useGitIgnore: true
followRedirects: false # Example of including it in a full config
